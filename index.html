<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure HashPad Pro | Ask</title>
    <style>
        :root {
            /* Light Mode Variables */
            --bg-color: #f0f4f8;
            --bg-gradient: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: rgba(31, 38, 135, 0.15);
            --text-main: #1e293b;
            --text-muted: #475569;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --input-bg: rgba(255, 255, 255, 0.5);
            --success-bg: rgba(220, 252, 231, 0.6);
            --success-border: rgba(134, 239, 172, 0.6);
        }

        [data-theme="dark"] {
            /* Dark Mode Variables */
            --bg-color: #0f172a;
            --bg-gradient: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: rgba(0, 0, 0, 0.4);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --primary: #60a5fa;
            --primary-hover: #3b82f6;
            --input-bg: rgba(0, 0, 0, 0.3);
            --success-bg: rgba(20, 83, 45, 0.4);
            --success-border: rgba(34, 197, 94, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            background-image: var(--bg-gradient);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-main);
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* Glassmorphism Core Class */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 var(--glass-shadow);
        }

        .container {
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 650px;
            transition: all 0.4s ease;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        h2 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 5px;
            margin-bottom: 20px;
        }

        /* Theme Toggle Button */
        .theme-toggle {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s ease;
        }
        
        .theme-toggle:hover {
            transform: scale(1.05);
            background: var(--glass-bg);
        }

        textarea {
            width: 100%;
            height: 250px;
            padding: 16px;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-main);
            font-size: 1rem;
            resize: vertical;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        textarea:focus, input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        textarea::placeholder, input::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }

        .controls {
            display: grid;
            gap: 12px;
            margin-top: 24px;
        }

        .input-group {
            position: relative;
            display: flex;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .toggle-pass {
            cursor: pointer;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: 0.5px;
            user-select: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        #changeBtn {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            box-shadow: none;
        }

        #changeBtn:hover {
            background: var(--glass-bg);
        }

        #link-output {
            margin-top: 24px;
            padding: 16px;
            background: var(--success-bg);
            border-radius: 12px;
            word-break: break-all;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.9rem;
            border: 1px solid var(--success-border);
            color: var(--text-main);
            line-height: 1.5;
            animation: fadeIn 0.4s ease;
        }

        #link-output a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        #link-output a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Abstract Background Elements for pure glassmorphism vibe */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
        }
        .blob-1 {
            top: 10%;
            left: 20%;
            width: 300px;
            height: 300px;
            background: rgba(142, 197, 252, 0.5);
        }
        .blob-2 {
            bottom: 10%;
            right: 20%;
            width: 350px;
            height: 350px;
            background: rgba(224, 195, 252, 0.5);
        }
        [data-theme="dark"] .blob-1 { background: rgba(59, 130, 246, 0.2); }
        [data-theme="dark"] .blob-2 { background: rgba(139, 92, 246, 0.2); }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="container glass">
    <div class="header">
        <div>
            <h2>🔐 Secure HashPad</h2>
            <div class="subtitle">Zero-knowledge: Data lives only in your URL.</div>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon" aria-label="Toggle theme">🌙</button>
    </div>

    <textarea id="note" placeholder="Write your secret message..."></textarea>

    <div class="controls">
        <div class="input-group">
            <input type="password" id="pass1" placeholder="Main Password (Required)">
            <span class="toggle-pass" onclick="toggleView('pass1')">VIEW</span>
        </div>

        <div class="input-group">
            <input type="password" id="pass2" placeholder="Secondary PIN (Optional Extra Lock)">
            <span class="toggle-pass" onclick="toggleView('pass2')">VIEW</span>
        </div>

        <button onclick="generateLink()">Generate Secure URL</button>
        <button id="changeBtn" style="display:none;" onclick="enableChange()">Edit Password / Update Note</button>
    </div>

    <div id="link-output" style="display:none;"></div>
</div>

<script>
    // --- Theme Logic ---
    function toggleTheme() {
        const body = document.documentElement;
        const currentTheme = body.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', newTheme);
        document.getElementById('themeIcon').innerText = newTheme === 'dark' ? '☀️' : '🌙';
        localStorage.setItem('theme', newTheme);
    }

    // Initialize theme based on system preference or saved state
    const savedTheme = localStorage.getItem('theme');
    const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('themeIcon').innerText = '☀️';
    }

    // --- Core Cryptography & App Logic (Unchanged) ---
    const enc = new TextEncoder();
    const dec = new TextDecoder();

    // Toggle Password Visibility
    function toggleView(id) {
        const el = document.getElementById(id);
        el.type = el.type === "password" ? "text" : "password";
        // Update button text contextually
        event.target.innerText = el.type === "password" ? "VIEW" : "HIDE";
    }

    // Helper: Derive Key
    async function deriveKey(password, salt) {
        const baseKey = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
        return crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" }, baseKey, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
    }

    // Helper: Encrypt logic
    async function encrypt(text, password) {
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await deriveKey(password, salt);
        const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(text));
        return { salt, iv, encrypted: new Uint8Array(encrypted) };
    }

    async function generateLink() {
        let text = document.getElementById('note').value;
        const p1 = document.getElementById('pass1').value;
        const p2 = document.getElementById('pass2').value;

        if (!text || !p1) return alert("Note and Main Password are required!");

        // If secondary lock exists, encrypt the text twice
        if (p2) {
            const step1 = await encrypt(text, p2);
            text = JSON.stringify({
                s: btoa(String.fromCharCode(...step1.salt)),
                i: btoa(String.fromCharCode(...step1.iv)),
                d: btoa(String.fromCharCode(...step1.encrypted))
            });
        }

        const final = await encrypt(text, p1);
        const package = new Uint8Array(final.salt.length + final.iv.length + final.encrypted.length);
        package.set(final.salt);
        package.set(final.iv, 16);
        package.set(final.encrypted, 16 + 12);

        const base64 = btoa(String.fromCharCode(...package)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        const url = window.location.origin + window.location.pathname + "#" + base64;
        
        const out = document.getElementById('link-output');
        out.style.display = "block";
        out.innerHTML = `<strong>Share this link:</strong><br><br><a href="${url}">${url}</a>`;
    }

    window.onload = async () => {
        const hash = window.location.hash.substring(1);
        if (!hash) return;

        const p1 = prompt("Enter Main Password to decrypt:");
        if (!p1) return;

        try {
            const raw = atob(hash.replace(/-/g, '+').replace(/_/g, '/'));
            const data = Uint8Array.from(raw, c => c.charCodeAt(0));
            const salt = data.slice(0, 16);
            const iv = data.slice(16, 28);
            const encrypted = data.slice(28);

            const key = await deriveKey(p1, salt);
            const decryptedRaw = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, encrypted);
            let result = dec.decode(decryptedRaw);

            // Check for secondary lock
            try {
                const secondLayer = JSON.parse(result);
                if (secondLayer.d) {
                    const p2 = prompt("Secondary PIN required to unlock inner layer:");
                    const s2 = Uint8Array.from(atob(secondLayer.s), c => c.charCodeAt(0));
                    const i2 = Uint8Array.from(atob(secondLayer.i), c => c.charCodeAt(0));
                    const d2 = Uint8Array.from(atob(secondLayer.d), c => c.charCodeAt(0));
                    
                    const k2 = await deriveKey(p2, s2);
                    const dec2 = await crypto.subtle.decrypt({ name: "AES-GCM", iv: i2 }, k2, d2);
                    result = dec.decode(dec2);
                }
            } catch (e) { /* Not a secondary lock, just plain text */ }

            document.getElementById('note').value = result;
            document.getElementById('changeBtn').style.display = "block";
        } catch (e) {
            alert("Decryption failed. Wrong password or corrupted link.");
        }
    };

    function enableChange() {
        alert("The note is now editable. Change the text or passwords and click 'Generate Secure URL' to create a NEW link.");
        window.location.hash = ""; // Clear hash to reset
        document.getElementById('link-output').style.display = "none";
    }
</script>

</body>
</html>
